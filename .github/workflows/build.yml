name: Construir APK de Autochindy

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4
    
    - name: Configurar Java 17 (JDK)
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Instalar Gradle Nube
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: '8.4'

    - name: Encontrar carpeta y Compilar APK
      run: |
        # Buscar la subcarpeta donde metiste el proyecto
        PROJECT_DIR=$(dirname $(find . -name "settings.gradle.kts" | head -n 1))
        echo "Entrando a: $PROJECT_DIR"
        cd "$PROJECT_DIR"
        
        # Compilar
        gradle assembleDebug --stacktrace

    - name: Subir el APK generado
      uses: actions/upload-artifact@v4
      with:
        name: Autochindy-App-Instalable
        path: "**/app/build/outputs/apk/debug/app-debug.apk"
